# .github/workflows/refresh.yml
# ─────────────────────────────────────────────────────────────────────────────
# Runs every Monday at 06:00 UTC. Fetches fresh data from WHO, World Bank,
# and OWID, reprocesses it, invalidates stale briefs, and redeploys to
# shinyapps.io. Also triggered manually via the Actions tab.
# ─────────────────────────────────────────────────────────────────────────────

name: Weekly Data Refresh

on:
  schedule:
    - cron: "0 6 * * 1"    # Every Monday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write           # needed for git-auto-commit-action to push back

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Check out the repository ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up R ─────────────────────────────────────────────────────────
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true   # faster binary installs

      # ── 3. Cache R packages ─────────────────────────────────────────────────
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-4.4-${{ hashFiles('.github/workflows/refresh.yml') }}
          restore-keys: ${{ runner.os }}-r-4.4-

      # ── 4. Install dependencies ─────────────────────────────────────────────
      - name: Install R packages
        run: |
          install.packages(c(
            "httr2", "jsonlite", "wbstats", "readr", "dplyr", "tidyr",
            "purrr", "countrycode", "digest", "here", "glue", "scales",
            "shiny", "bslib", "plotly", "ggplot2", "rsconnect"
          ))
        shell: Rscript {0}

      # ── 5. Fetch fresh data ─────────────────────────────────────────────────
      - name: Fetch data
        run: Rscript R/fetch_data.R
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # ── 6. Process and join ─────────────────────────────────────────────────
      - name: Process data
        run: Rscript R/process_data.R

      # ── 7. Invalidate stale brief cache ─────────────────────────────────────
      - name: Invalidate brief cache
        run: |
          source("R/generate_brief.R")
          invalidate_brief_cache()
        shell: Rscript {0}

      # ── 8. Commit updated processed data ────────────────────────────────────
      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: weekly refresh (${{ github.run_id }})"
          file_pattern: "data/processed/*.rds"

      # ── 9. Deploy to shinyapps.io ────────────────────────────────────────────
      - name: Deploy to shinyapps.io
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_NAME"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
          # Push GEMINI_API_KEY into the shinyapps.io app environment
          rsconnect::configureApp(
            appName = "couch-economy",
            envVars = c(GEMINI_API_KEY = Sys.getenv("GEMINI_API_KEY"))
          )
          rsconnect::deployApp(
            appDir      = ".",
            appName     = "couch-economy",
            forceUpdate = TRUE,
            launch.browser = FALSE
          )
        shell: Rscript {0}
        env:
          SHINYAPPS_NAME:   ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN:  ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
